anaconda_config_version: 1
upstream_sources:
  - gitlab:
      identifier: glvnd/libglvnd
      host: gitlab.freedesktop.org
      use_max_tag: true
      include_regex: ^v[\d.]+$
      from_pattern: ^v(.+)$
      to_pattern: \1
    packages:
      - libglvnd
      - libglvnd-devel
      - libopengl
      - libopengl-devel
      - libglx
      - libglx-devel
      - libgl
      - libgl-devel
      - libegl
      - libegl-devel
      - libgles
      - libgles-devel
